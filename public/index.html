<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover" />
    <title>bolt-expo-nativewind</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      /* Prevent iOS auto-zoom on input focus (requires font-size >= 16px) */
      input, textarea, select {
        font-size: 16px !important;
        touch-action: manipulation;
      }
    </style>
    <style id="dawen-focus-reset">
      /* Remove default browser blue outline on all interactive elements */
      *,
      *:focus,
      *:focus-visible {
        outline: none !important;
        -webkit-tap-highlight-color: transparent !important;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.35) !important;
        border-color: rgba(139, 92, 246, 0.7) !important;
      }
      button:focus,
      [role="button"]:focus {
        outline: none !important;
      }
      /* Remove iOS tap flash */
      * {
        -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        -webkit-touch-callout: none;
      }
    </style>
    <script>
      // Must run before the main bundle to prevent process.version/nextTick crashes
      (function() {
        var p = globalThis.process || {};
        p.browser = true;
        p.version = p.version || 'v18.0.0';
        p.versions = p.versions || { node: '18.0.0' };
        p.env = p.env || {};
        p.platform = p.platform || 'browser';
        p.title = p.title || 'browser';
        p.nextTick = p.nextTick || function(fn) {
          var args = Array.prototype.slice.call(arguments, 1);
          Promise.resolve().then(function() { fn.apply(null, args); });
        };
        p.cwd = p.cwd || function() { return '/'; };
        p.stdout = p.stdout || null;
        p.stderr = p.stderr || null;
        p.on = p.on || function() { return p; };
        p.addListener = p.addListener || function() { return p; };
        p.once = p.once || function() { return p; };
        p.off = p.off || function() { return p; };
        p.removeListener = p.removeListener || function() { return p; };
        p.removeAllListeners = p.removeAllListeners || function() { return p; };
        p.emit = p.emit || function() { return false; };
        p.listeners = p.listeners || function() { return []; };
        p.binding = p.binding || function() { throw new Error('process.binding is not supported'); };
        p.umask = p.umask || function() { return 0; };
        globalThis.process = p;
        if (typeof window !== 'undefined') window.process = p;
        if (typeof global !== 'undefined') global.process = p;
        if (!globalThis.global) globalThis.global = globalThis;
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
