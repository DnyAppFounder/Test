  <head>
    <meta charset="utf-8" />

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:image" content="/assets/dawenlogo.eafabd65bbba8a3c8d23de4c7446ffcc.jpeg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DAWEN — Solana Social Trading" />
    <meta name="twitter:description" content="Trade tokens, follow traders, and game on-chain. The Solana social trading app." />
    <meta name="twitter:image" content="/assets/dawenlogo.eafabd65bbba8a3c8d23de4c7446ffcc.jpeg" />
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      html {
        overscroll-behavior: none;
        overscroll-behavior-y: none;
      }
      body {
        overflow: hidden;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        overscroll-behavior: none;
        overscroll-behavior-y: none;
      }
      /* Block pull-to-refresh on ALL inner scroll containers (React Native Web creates these) */
      * {
        overscroll-behavior-y: none;
      }
      /* Prevent iOS auto-zoom on input focus (requires font-size >= 16px) */
      input, textarea, select {
        font-size: 16px !important;
        touch-action: manipulation;
        overscroll-behavior-y: auto;
      }
    </style>
    <style id="dawen-focus-reset">
      /* Remove default browser blue outline on all interactive elements */
      *,
      *:focus,
      *:focus-visible {
        outline: none !important;
        -webkit-tap-highlight-color: transparent !important;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none !important;
        box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.35) !important;
        border-color: rgba(139, 92, 246, 0.7) !important;
      }
      button:focus,
      [role="button"]:focus {
        outline: none !important;
      }
      /* Remove iOS tap flash */
      * {
        -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        -webkit-touch-callout: none;
      }
    </style>
    <script>
      // Once-per-session reload guard — prevents any code-driven reload loop.
      // If location.reload() is called, it only fires once per browser session.
      // Subsequent calls within the same session are silently ignored.
      (function() {
        var SESSION_KEY = 'dawen_reloaded_once';
        var _nativeReload = window.location.reload.bind(window.location);
        Object.defineProperty(window.location, 'reload', {
          configurable: true,
          writable: true,
          value: function() {
            if (sessionStorage.getItem(SESSION_KEY)) {
              console.warn('[DAWEN] reload() blocked — already reloaded once this session');
              return;
            }
            sessionStorage.setItem(SESSION_KEY, '1');
            _nativeReload();
          }
        });
      })();
    </script>
    <script>
      // Must run before the main bundle to prevent process.version/nextTick crashes
      (function() {
        var p = globalThis.process || {};
        p.browser = true;
        p.version = p.version || 'v18.0.0';
        p.versions = p.versions || { node: '18.0.0' };
        p.env = p.env || {};
        p.platform = p.platform || 'browser';
        p.title = p.title || 'browser';
        p.nextTick = p.nextTick || function(fn) {
          var args = Array.prototype.slice.call(arguments, 1);
          Promise.resolve().then(function() { fn.apply(null, args); });
        };
        p.cwd = p.cwd || function() { return '/'; };
        p.stdout = p.stdout || null;
        p.stderr = p.stderr || null;
        p.on = p.on || function() { return p; };
        p.addListener = p.addListener || function() { return p; };
        p.once = p.once || function() { return p; };
        p.off = p.off || function() { return p; };
        p.removeListener = p.removeListener || function() { return p; };
        p.removeAllListeners = p.removeAllListeners || function() { return p; };
        p.emit = p.emit || function() { return false; };
        p.listeners = p.listeners || function() { return []; };
        p.binding = p.binding || function() { throw new Error('process.binding is not supported'); };
        p.umask = p.umask || function() { return 0; };
        globalThis.process = p;
        if (typeof window !== 'undefined') window.process = p;
        if (typeof global !== 'undefined') global.process = p;
        if (!globalThis.global) globalThis.global = globalThis;
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
