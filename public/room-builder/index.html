<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0D0A1A; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; background: #0D0A1A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-family: system-ui, sans-serif;
      z-index: 100; gap: 16px;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(139,92,246,0.3);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-title { font-size: 18px; font-weight: 700; color: #fff; }
    .load-sub { font-size: 12px; color: rgba(255,255,255,0.4); }
    .progress-bar-wrap { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: #8B5CF6; border-radius: 2px; width: 0%; transition: width 0.3s; }
    #error-view {
      position: fixed; inset: 0; background: #0D0A1A;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-family: system-ui, sans-serif;
      gap: 12px; padding: 24px; text-align: center;
    }
    #error-view.visible { display: flex; }
    #unity-canvas {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      background: #231F20;
    }
  </style>
</head>
<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <div id="loading">
    <div class="spinner"></div>
    <div class="load-title">Loading Room Builder</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="load-sub" id="load-sub">Initializing...</div>
  </div>

  <div id="error-view">
    <div style="font-size:32px">&#9888;</div>
    <div style="font-size:18px;font-weight:700;color:#EF4444">Room Builder Failed to Load</div>
    <div id="error-msg" style="font-size:12px;color:rgba(255,255,255,0.5);max-width:300px;margin-top:4px"></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">Requires HTTPS and WebGL 2.0</div>
    <button id="btn-go-back"
      style="margin-top:16px;padding:10px 20px;background:#8B5CF6;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">
      Go Back
    </button>
  </div>

  <script>
    var unityInstance = null;
    var loadedOk = false;
    var timeoutHandle = null;

    function notifyParent(type, data) {
      var msg = JSON.stringify({ type: type, data: data });
      if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(msg);
      if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
    }

    function showError(msg) {
      if (loadedOk) return;
      clearTimeout(timeoutHandle);
      console.error('[RoomBuilder] Error:', msg);
      document.getElementById('loading').classList.add('hidden');
      var ev = document.getElementById('error-view');
      ev.classList.add('visible');
      document.getElementById('error-msg').textContent = msg || 'Unknown error';
      notifyParent('builder_error', msg);
    }

    document.getElementById('btn-go-back').onclick = function() {
      notifyParent('builder_error', 'user_back');
    };

    // Unity callbacks
    window.onRoomSaved = function(jsonData) {
      notifyParent('room_saved', typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData);
    };
    window.onRoomBuilderReady = function() {
      notifyParent('builder_ready', null);
    };

    // Resize canvas
    function resizeCanvas() {
      var c = document.getElementById('unity-canvas');
      c.style.width = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 10-second hard timeout — if Unity files fail to load they fail fast
    timeoutHandle = setTimeout(function() {
      if (!loadedOk) {
        showError('Room Builder failed to load. Check console/network tab for missing or failed files.');
      }
    }, 10000);

    function startUnity() {
      if (typeof createUnityInstance === 'undefined') {
        showError('Builds.loader.js failed to load. Check that Unity files are deployed correctly at /room-builder/.');
        return;
      }
      try {
        createUnityInstance(document.getElementById('unity-canvas'), {
          arguments: [],
          dataUrl:      'Builds.data.br',
          frameworkUrl: 'Builds.framework.js.br',
          codeUrl:      'Builds.wasm.br',
          streamingAssetsUrl: 'StreamingAssets',
          companyName:   'InxExperiments',
          productName:   'RoomBuilder',
          productVersion: '1.0',
        }, function(progress) {
          var pct = Math.round(progress * 100);
          document.getElementById('progress-bar').style.width = pct + '%';
          document.getElementById('load-sub').textContent = 'Loading... ' + pct + '%';
        }).then(function(instance) {
          loadedOk = true;
          clearTimeout(timeoutHandle);
          unityInstance = instance;
          document.getElementById('loading').classList.add('hidden');
          notifyParent('builder_loaded', null);
        }).catch(function(err) {
          showError(String(err));
        });
      } catch (e) {
        showError(String(e));
      }
    }
  </script>

  <!-- Load Unity loader; on error, call showError immediately -->
  <script src="Builds.loader.js" onload="startUnity()" onerror="showError('Builds.loader.js not found (404). Check deployment paths.')"></script>
</body>
</html>
